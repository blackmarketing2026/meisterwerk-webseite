<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Passwort zurücksetzen – Meisterwerk</title>
  <meta name="description" content="Passwort zurücksetzen bei Meisterwerk.">
  <meta name="robots" content="noindex, nofollow">

  <link rel="stylesheet" href="/assets/css/style.css">
  <link rel="stylesheet" href="/assets/css/responsive.css">

  <style>
    .reset-section {
      min-height: 60vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
    }

    .reset-box {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 48px 40px;
      max-width: 440px;
      width: 100%;
    }

    .reset-box h1 {
      font-size: 1.6rem;
      margin-bottom: 8px;
    }

    .reset-box p.subtitle {
      color: #666;
      margin-bottom: 28px;
      font-size: 0.95rem;
    }

    .reset-box label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      font-size: 0.9rem;
    }

    .reset-box input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      box-sizing: border-box;
      margin-bottom: 20px;
      transition: border-color 0.2s;
    }

    .reset-box input[type="password"]:focus {
      outline: none;
      border-color: #e85d04;
    }

    .reset-box button {
      width: 100%;
      background: #e85d04;
      color: #fff;
      border: none;
      padding: 14px;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .reset-box button:hover { background: #c94e02; }
    .reset-box button:disabled { background: #aaa; cursor: not-allowed; }

    #reset-message {
      margin-top: 16px;
      font-size: 0.9rem;
      min-height: 20px;
    }

    #reset-message.success { color: #2e7d32; }
    #reset-message.error   { color: #c62828; }
  </style>
</head>

<body>

  <!--#include virtual="/includes/header.shtml" -->

  <main>
    <section class="reset-section">
      <div class="reset-box" id="form-container">
        <h1>Neues Passwort festlegen</h1>
        <p class="subtitle">Gib dein neues Passwort ein.</p>

        <form id="reset-form" novalidate>
          <label for="password">Neues Passwort</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Mindestens 8 Zeichen"
            required
            minlength="8"
            autocomplete="new-password"
          >

          <label for="password-confirm">Passwort bestätigen</label>
          <input
            type="password"
            id="password-confirm"
            name="password-confirm"
            placeholder="Passwort wiederholen"
            required
            autocomplete="new-password"
          >

          <button type="submit" id="reset-btn">Passwort speichern</button>
        </form>

        <p id="reset-message" role="status" aria-live="polite"></p>
      </div>
    </section>
  </main>

  <!--#include virtual="/includes/footer.shtml" -->

  <script src="/assets/js/main.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    if (!token) {
      document.getElementById('form-container').innerHTML = `
        <h1>Ungültiger Link</h1>
        <p>Dieser Link ist nicht gültig. <a href="/forgot-password">Neuen Link anfordern</a>.</p>
      `;
    }

    document.getElementById('reset-form')?.addEventListener('submit', async function (e) {
      e.preventDefault();

      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('password-confirm').value;
      const btn      = document.getElementById('reset-btn');
      const msg      = document.getElementById('reset-message');

      msg.textContent = '';
      msg.className = '';

      if (password.length < 8) {
        msg.textContent = 'Das Passwort muss mindestens 8 Zeichen lang sein.';
        msg.className = 'error';
        return;
      }

      if (password !== confirm) {
        msg.textContent = 'Die Passwörter stimmen nicht überein.';
        msg.className = 'error';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Wird gespeichert…';

      try {
        const res = await fetch('/api/verify-reset-token', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token }),
        });

        const data = await res.json();

        if (res.ok) {
          document.getElementById('reset-form').style.display = 'none';
          msg.textContent = 'Dein Passwort wurde erfolgreich zurückgesetzt. Du kannst dich jetzt einloggen.';
          msg.className = 'success';
        } else {
          msg.textContent = data.error || 'Ein Fehler ist aufgetreten.';
          msg.className = 'error';
          btn.disabled = false;
          btn.textContent = 'Passwort speichern';
        }
      } catch {
        msg.textContent = 'Keine Verbindung möglich. Bitte versuche es später erneut.';
        msg.className = 'error';
        btn.disabled = false;
        btn.textContent = 'Passwort speichern';
      }
    });
  </script>

</body>
</html>
