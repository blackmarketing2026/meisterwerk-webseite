<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <!--#include virtual="/includes/gtag.shtml" -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Passwort vergessen – Meisterwerk</title>
  <meta name="description" content="Passwort zurücksetzen bei Meisterwerk.">
  <meta name="robots" content="noindex, nofollow">

  <link rel="stylesheet" href="/assets/css/style.css">
  <link rel="stylesheet" href="/assets/css/responsive.css">

  <style>
    .reset-section {
      min-height: 60vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
    }

    .reset-box {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 48px 40px;
      max-width: 440px;
      width: 100%;
    }

    .reset-box h1 {
      font-size: 1.6rem;
      margin-bottom: 8px;
    }

    .reset-box p.subtitle {
      color: #666;
      margin-bottom: 28px;
      font-size: 0.95rem;
    }

    .reset-box label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      font-size: 0.9rem;
    }

    .reset-box input[type="email"] {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      box-sizing: border-box;
      margin-bottom: 20px;
      transition: border-color 0.2s;
    }

    .reset-box input[type="email"]:focus {
      outline: none;
      border-color: #e85d04;
    }

    .reset-box button {
      width: 100%;
      background: #e85d04;
      color: #fff;
      border: none;
      padding: 14px;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .reset-box button:hover {
      background: #c94e02;
    }

    .reset-box button:disabled {
      background: #aaa;
      cursor: not-allowed;
    }

    #reset-message {
      margin-top: 16px;
      font-size: 0.9rem;
      min-height: 20px;
    }

    #reset-message.success { color: #2e7d32; }
    #reset-message.error   { color: #c62828; }
  </style>
</head>

<body>

  <!--#include virtual="/includes/header.shtml" -->

  <main>
    <section class="reset-section">
      <div class="reset-box">
        <h1>Passwort vergessen?</h1>
        <p class="subtitle">Gib deine E-Mail-Adresse ein. Wir schicken dir einen Link zum Zurücksetzen.</p>

        <form id="reset-form" novalidate>
          <label for="email">E-Mail-Adresse</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="deine@email.de"
            required
            autocomplete="email"
          >
          <button type="submit" id="reset-btn">Link anfordern</button>
        </form>

        <p id="reset-message" role="status" aria-live="polite"></p>
      </div>
    </section>
  </main>

  <!--#include virtual="/includes/footer.shtml" -->

  <script src="/assets/js/main.js"></script>
  <script>
    document.getElementById('reset-form').addEventListener('submit', async function (e) {
      e.preventDefault();

      const email = document.getElementById('email').value.trim();
      const btn = document.getElementById('reset-btn');
      const msg = document.getElementById('reset-message');

      msg.textContent = '';
      msg.className = '';

      if (!email) {
        msg.textContent = 'Bitte gib eine E-Mail-Adresse ein.';
        msg.className = 'error';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Wird gesendet…';

      try {
        const res = await fetch('/api/send-reset-email', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });

        if (res.ok) {
          msg.textContent = 'Falls diese Adresse bei uns registriert ist, erhältst du in Kürze eine E-Mail.';
          msg.className = 'success';
          document.getElementById('email').value = '';
        } else {
          const data = await res.json();
          msg.textContent = data.error || 'Ein Fehler ist aufgetreten. Bitte versuche es erneut.';
          msg.className = 'error';
        }
      } catch {
        msg.textContent = 'Keine Verbindung möglich. Bitte versuche es später erneut.';
        msg.className = 'error';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Link anfordern';
      }
    });
  </script>

</body>
</html>
